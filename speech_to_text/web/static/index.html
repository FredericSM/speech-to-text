<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speech to Text</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 3rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 { font-size: 1.6rem; }
      form { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
      label { font-weight: 600; }
      input, select, button { font: inherit; padding: 0.5rem; }
      button {
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        padding: 0.7rem;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      progress { width: 100%; height: 1.2rem; }
      #status { margin-top: 1.5rem; }
      .hidden { display: none; }
      .error { color: #dc2626; }
      a.download {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        background: #16a34a;
        color: #fff;
        border-radius: 6px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>🎙️ Speech to Text</h1>
    <p>Upload a long MP3 and get a plain-text transcript. Processing runs locally with Whisper.</p>

    <form id="form">
      <div>
        <label for="file">Audio file (MP3)</label><br />
        <input id="file" name="file" type="file" accept="audio/*" required />
      </div>
      <div>
        <label for="language">Language (optional)</label><br />
        <input id="language" name="language" type="text" placeholder="auto-detect — e.g. en, fr" />
      </div>
      <button id="submit" type="submit">Transcribe</button>
    </form>

    <div id="status" class="hidden">
      <p id="status-text"></p>
      <progress id="bar" value="0" max="1"></progress>
      <div id="result"></div>
    </div>

    <script>
      const form = document.getElementById("form");
      const submitBtn = document.getElementById("submit");
      const statusBox = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      const bar = document.getElementById("bar");
      const result = document.getElementById("result");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        result.innerHTML = "";
        statusBox.classList.remove("hidden");
        submitBtn.disabled = true;

        const data = new FormData(form);
        statusText.textContent = "Uploading…";
        bar.removeAttribute("value");

        let jobId;
        try {
          const res = await fetch("/jobs", { method: "POST", body: data });
          if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
          jobId = (await res.json()).job_id;
        } catch (err) {
          fail(err.message);
          return;
        }

        poll(jobId);
      });

      async function poll(jobId) {
        try {
          const res = await fetch(`/jobs/${jobId}`);
          const state = await res.json();

          if (state.status === "completed") {
            bar.value = 1;
            statusText.textContent = `Done — detected language: ${state.language ?? "?"}`;
            result.innerHTML =
              `<a class="download" href="/jobs/${jobId}/download">⬇ Download transcript (.txt)</a>`;
            submitBtn.disabled = false;
            return;
          }
          if (state.status === "failed") {
            fail(state.error || "Transcription failed");
            return;
          }

          statusText.textContent =
            state.status === "processing"
              ? `Transcribing… ${Math.round(state.progress * 100)}%`
              : "Queued…";
          if (state.status === "processing") bar.value = state.progress;
          setTimeout(() => poll(jobId), 1500);
        } catch (err) {
          fail(err.message);
        }
      }

      function fail(message) {
        bar.value = 0;
        statusText.innerHTML = `<span class="error">Error: ${message}</span>`;
        submitBtn.disabled = false;
      }
    </script>
  </body>
</html>

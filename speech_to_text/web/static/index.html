<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speech to Text</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #1a1c24;
        --muted: #6b7280;
        --border: #e4e6ee;
        --accent: #4f46e5;
        --accent-soft: #eef0ff;
        --ok: #16a34a;
        --err: #dc2626;
        --radius: 16px;
        --shadow: 0 10px 30px -12px rgba(20, 22, 40, 0.18);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d0e14;
          --card: #16181f;
          --text: #e8e9ef;
          --muted: #9499a6;
          --border: #262932;
          --accent: #818cf8;
          --accent-soft: #1c1f2e;
          --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
        }
      }

      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(1.5rem, 5vw, 4rem) 1rem;
        line-height: 1.55;
      }
      .app { width: 100%; max-width: 540px; }

      header { text-align: center; margin-bottom: 1.75rem; }
      .logo {
        width: 56px; height: 56px;
        margin: 0 auto 0.75rem;
        display: grid; place-items: center;
        font-size: 1.7rem;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--accent), #a855f7);
        box-shadow: var(--shadow);
      }
      h1 { font-size: 1.5rem; margin: 0; letter-spacing: -0.02em; }
      header p { color: var(--muted); margin: 0.35rem 0 0; font-size: 0.95rem; }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 1.5rem;
      }

      .dropzone {
        border: 1.5px dashed var(--border);
        border-radius: 12px;
        padding: 2rem 1rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, transform 0.1s;
        background: transparent;
      }
      .dropzone:hover { border-color: var(--accent); }
      .dropzone.drag {
        border-color: var(--accent);
        background: var(--accent-soft);
        transform: scale(1.01);
      }
      .dropzone.has-file { border-style: solid; border-color: var(--accent); background: var(--accent-soft); }
      .dz-icon { font-size: 1.8rem; }
      .dz-title { font-weight: 600; margin: 0.5rem 0 0.15rem; }
      .dz-hint { color: var(--muted); font-size: 0.85rem; margin: 0; }
      .file-pill {
        display: none;            /* shown as flex by JS */
        align-items: center;
        gap: 0.6rem;
        justify-content: center;
        width: 100%;
        max-width: 100%;
      }
      .file-pill .dz-icon { flex: none; }
      .file-pill .file-text {
        display: flex;
        align-items: baseline;
        gap: 0.4rem;
        min-width: 0;             /* let the name shrink so ellipsis kicks in */
        overflow: hidden;
      }
      .file-pill .name {
        font-weight: 600;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .file-pill .meta { color: var(--muted); font-size: 0.85rem; flex: none; white-space: nowrap; }

      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      @media (max-width: 460px) { .grid-2 { grid-template-columns: 1fr; gap: 0; } }
      .field { margin-top: 1.25rem; min-width: 0; }
      .field label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.4rem; }
      .hint-line { color: var(--muted); font-size: 0.8rem; margin: 0.55rem 0 0; }
      select {
        font: inherit;
        width: 100%;
        padding: 0.65rem 0.7rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
      }

      button.primary {
        font: inherit;
        font-weight: 600;
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.85rem;
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.05s;
      }
      button.primary:hover:not(:disabled) { opacity: 0.92; }
      button.primary:active:not(:disabled) { transform: translateY(1px); }
      button.primary:disabled { opacity: 0.45; cursor: not-allowed; }

      /* progress / status panel */
      .panel { margin-top: 1.5rem; display: none; }
      .panel.show { display: block; animation: fade 0.25s ease; }
      @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

      .status-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; }
      .spinner {
        width: 16px; height: 16px; flex: none;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status-text { font-weight: 600; font-size: 0.95rem; }
      .pct { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; }

      .track { height: 10px; border-radius: 999px; background: var(--border); overflow: hidden; }
      .fill {
        height: 100%; width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), #a855f7);
        transition: width 0.4s ease;
      }
      .track.indeterminate .fill {
        width: 35% !important;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }

      .result { margin-top: 1.25rem; display: none; }
      .result.show { display: block; }
      .download {
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        padding: 0.85rem;
        background: var(--ok);
        color: #fff;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
      }
      .meta-line { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 0.6rem; }

      .banner {
        margin-top: 1rem;
        padding: 0.75rem 0.9rem;
        border-radius: 10px;
        font-size: 0.9rem;
        display: none;
      }
      .banner.show { display: block; }
      .banner.error { background: color-mix(in srgb, var(--err) 12%, transparent); color: var(--err); }

      footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 1.25rem; }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">🎙️</div>
        <h1>Speech to Text</h1>
        <p>Transcribe long MP3s to text — runs locally with Whisper.</p>
      </header>

      <form id="form" class="card">
        <input id="file" type="file" accept="audio/*" hidden />
        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Choose or drop an audio file">
          <div id="dz-empty">
            <div class="dz-icon">📁</div>
            <p class="dz-title">Drop an audio file here</p>
            <p class="dz-hint">or click to browse · MP3, WAV, M4A…</p>
          </div>
          <div id="dz-file" class="file-pill">
            <span class="dz-icon">🎧</span>
            <span class="file-text">
              <span class="name" id="file-name"></span>
              <span class="meta" id="file-meta"></span>
            </span>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="language">Language</label>
            <select id="language">
              <option value="">Auto-detect</option>
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="nl">Dutch</option>
              <option value="ru">Russian</option>
              <option value="zh">Chinese</option>
              <option value="ja">Japanese</option>
              <option value="ar">Arabic</option>
            </select>
          </div>

          <div class="field">
            <label for="model">Model</label>
            <select id="model">
              <option value="tiny">Tiny — fastest, least accurate</option>
              <option value="base">Base</option>
              <option value="small" selected>Small — balanced (default)</option>
              <option value="medium">Medium</option>
              <option value="large-v3">Large-v3 — slowest, most accurate</option>
            </select>
          </div>
        </div>
        <p class="hint-line">Bigger models are more accurate but slower and download on first use.</p>

        <button id="submit" class="primary" type="submit" disabled>Transcribe</button>

        <div id="panel" class="panel">
          <div class="status-row">
            <span id="spinner" class="spinner"></span>
            <span id="status-text" class="status-text">Uploading…</span>
            <span id="pct" class="pct"></span>
          </div>
          <div id="track" class="track indeterminate"><div id="fill" class="fill"></div></div>

          <div id="result" class="result">
            <a id="download" class="download" href="#">⬇ Download transcript (.txt)</a>
            <p id="result-meta" class="meta-line"></p>
          </div>
        </div>

        <div id="banner" class="banner error"></div>
      </form>

      <footer>No audio leaves your machine.</footer>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const form = $("form"), fileInput = $("file"), dropzone = $("dropzone");
      const dzEmpty = $("dz-empty"), dzFile = $("dz-file"), fileName = $("file-name"), fileMeta = $("file-meta");
      const submitBtn = $("submit"), panel = $("panel"), spinner = $("spinner");
      const statusText = $("status-text"), pct = $("pct"), track = $("track"), fill = $("fill");
      const result = $("result"), download = $("download"), resultMeta = $("result-meta"), banner = $("banner");

      let selectedFile = null;

      const fmtSize = (bytes) => {
        const u = ["B", "KB", "MB", "GB"];
        let i = 0, n = bytes;
        while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
        return `${n.toFixed(n < 10 && i > 0 ? 1 : 0)} ${u[i]}`;
      };

      function setFile(file) {
        if (!file) return;
        selectedFile = file;
        fileName.textContent = file.name;
        fileMeta.textContent = ` · ${fmtSize(file.size)}`;
        dzEmpty.style.display = "none";
        dzFile.style.display = "flex";
        dropzone.classList.add("has-file");
        submitBtn.disabled = false;
        hideBanner();
      }

      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
      fileInput.addEventListener("change", () => setFile(fileInput.files[0]));

      ["dragenter", "dragover"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add("drag"); })
      );
      ["dragleave", "drop"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove("drag"); })
      );
      dropzone.addEventListener("drop", (e) => {
        const file = e.dataTransfer.files[0];
        if (file) setFile(file);
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!selectedFile) return;
        hideBanner();
        result.classList.remove("show");
        panel.classList.add("show");
        submitBtn.disabled = true;
        spinner.style.display = "";
        setStatus("Uploading…", null);

        const data = new FormData();
        data.append("file", selectedFile);
        data.append("language", $("language").value);
        data.append("model", $("model").value);

        let jobId;
        try {
          const res = await fetch("/jobs", { method: "POST", body: data });
          if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
          jobId = (await res.json()).job_id;
        } catch (err) {
          return fail(err.message);
        }
        poll(jobId);
      });

      async function poll(jobId) {
        try {
          const res = await fetch(`/jobs/${jobId}`);
          const state = await res.json();

          if (state.status === "completed") {
            setStatus("Done", 1);
            spinner.style.display = "none";
            download.href = `/jobs/${jobId}/download`;
            resultMeta.textContent = `Detected language: ${(state.language || "unknown").toUpperCase()}`;
            result.classList.add("show");
            submitBtn.disabled = false;
            return;
          }
          if (state.status === "failed") return fail(state.error || "Transcription failed");

          if (state.status === "processing") setStatus("Transcribing…", state.progress);
          else setStatus("Queued…", null);
          setTimeout(() => poll(jobId), 1500);
        } catch (err) {
          fail(err.message);
        }
      }

      function setStatus(text, progress) {
        statusText.textContent = text;
        if (progress === null || progress === undefined) {
          track.classList.add("indeterminate");
          pct.textContent = "";
        } else {
          track.classList.remove("indeterminate");
          fill.style.width = `${Math.round(progress * 100)}%`;
          pct.textContent = `${Math.round(progress * 100)}%`;
        }
      }

      function fail(message) {
        spinner.style.display = "none";
        track.classList.remove("indeterminate");
        fill.style.width = "0%";
        statusText.textContent = "Failed";
        pct.textContent = "";
        banner.textContent = `⚠ ${message}`;
        banner.classList.add("show");
        submitBtn.disabled = false;
      }

      function hideBanner() { banner.classList.remove("show"); }
    </script>
  </body>
</html>
